<script type="text/javascript">
$(document).ready(function() {
	$('.bxslider').bxSlider({
	  mode: 'fade',
	  captions: true,
	  controls: false,
	  auto: true
	});
	$('.mgt-campaign-slider').bxSlider({
		pager: false,
		nextSelector: '.arrowr',
		prevSelector: '.arrowl',
		nextText: '<img src="img/arrowr.png" width="26" height="44">',
		prevText: '<img src="img/arrowl.png" width="26" height="44">'
	});
	$('.popup-youtube, .popup-vimeo, .popup-gmaps').magnificPopup({
		disableOn: 700,
		type: 'iframe',
		mainClass: 'mfp-fade',
		removalDelay: 160,
		preloader: true,
		fixedContentPos: false
	});
});
</script>

<style type="text/css">
.iris-inside-grid{
	position: relative;
	float: left;
	width: 324px;
	height: 324px;
	margin: 0 14px 14px 0;
	cursor: pointer;
	}
.iris-inside-grid.threen{ margin-right: 0; }
.gimg{
	position: absolute;
	top: 0;
	left: 0;
	width: 324px;
	height: 324px;
	}

.iris-inside-grid-hover{
	position: absolute;
	top: 0;
	left: -99999999px;
	width: 324px;
	height: 324px;
	background: rgba(0,0,0,.6);
	opacity: 0;
	transition: opacity 0.4s ease-in-out 0s;
	}
.iris-inside-grid:hover .iris-inside-grid-hover{
	top: 0;
	left: 0;
	opacity: 1;
	}
.iris-inside-grid-hover .click {
	position: absolute;
	top: 50%;
	left: 50%;
    width: 160px;
	height: 120px;
	display: table;
    margin: -60px 0 0 -80px;
    color: #FFF;
	background: rgba(255,196,8,.5);
	font-family: "Times New Roman", Times, serif;
    font-size: 14px;
    line-height: 20px;
    letter-spacing: 1px;
    padding: 3px;
    border: 1px solid #FFF;
	}
.iris-inside-grid-hover .click span{
	display: table-cell;
	text-align : center;
	vertical-align : middle;
	}


.mfp-fade.mfp-bg {
	opacity: 0;
	-webkit-transition: all 0.15s ease-out; 
	-moz-transition: all 0.15s ease-out; 
	transition: all 0.15s ease-out;
}
.mfp-fade.mfp-bg.mfp-ready {
	opacity: 0.8;
}
.mfp-fade.mfp-bg.mfp-removing {
	opacity: 0;
}

.mfp-fade.mfp-wrap .mfp-content {
	opacity: 0;
	-webkit-transition: all 0.15s ease-out; 
	-moz-transition: all 0.15s ease-out; 
	transition: all 0.15s ease-out;
}
.mfp-fade.mfp-wrap.mfp-ready .mfp-content {
	opacity: 1;
}
.mfp-fade.mfp-wrap.mfp-removing .mfp-content {
	opacity: 0;
}

</style>
</head>
